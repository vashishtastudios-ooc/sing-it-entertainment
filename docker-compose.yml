version: "3.9"

services:
  app:
    build: .
    container_name: node_app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000"
    networks:
      - app_network

  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - app_network

networks:
  app_network:

volumes:
  caddy_data:
  caddy_config: